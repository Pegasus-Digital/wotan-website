version: '3'

# Traefik-based stack: replaced nginx + certbot (see docs/DEPLOY-TRAEFIK.md).
# Certs are issued and renewed automatically — no init script, no renew loop,
# no reload cron. Routing lives in labels on each app service.

services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PAYLOAD_SECRET: ${PAYLOAD_SECRET}
        DATABASE_URI: ${DATABASE_URI:-mongodb://mongo:27017/wotan}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
        PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL}
        SMTP_EMAIL: ${SMTP_EMAIL}
        SMTP_HOST: ${SMTP_HOST}
        SMTP_USER: ${SMTP_USER}
        SMTP_PASS: ${SMTP_PASS}
        SMTP_PORT: ${SMTP_PORT}
    image: wotan-website:latest
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URI: ${DATABASE_URI:-mongodb://mongo:27017/wotan}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_CONFIG_PATH: dist/payload/payload.config.js
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
      SMTP_EMAIL: ${SMTP_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_PORT: ${SMTP_PORT}
    depends_on:
      - mongo
    expose:
      - "3000"
    volumes:
      - media:/home/node/app/media
    networks:
      - app_network
      - web
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.payload.rule=Host(`wotanbrindes.com.br`) || Host(`www.wotanbrindes.com.br`)"
      - "traefik.http.routers.payload.entrypoints=websecure"
      - "traefik.http.routers.payload.tls.certresolver=letsencrypt"
      - "traefik.http.services.payload.loadbalancer.server.port=3000"

  payload-dev:
    image: wotan-website:latest
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URI: ${DEV_DATABASE_URI:-mongodb://mongo:27017/wotan-dev}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_CONFIG_PATH: dist/payload/payload.config.js
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_DEV_SERVER_URL:-https://testes.wotanbrindes.com.br}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_DEV_SERVER_URL:-https://testes.wotanbrindes.com.br}
      SMTP_EMAIL: ${SMTP_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_PORT: ${SMTP_PORT}
    depends_on:
      - mongo
    expose:
      - "3000"
    volumes:
      - media:/home/node/app/media
    networks:
      - app_network
      - web
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.payload-dev.rule=Host(`testes.wotanbrindes.com.br`)"
      - "traefik.http.routers.payload-dev.entrypoints=websecure"
      - "traefik.http.routers.payload-dev.tls.certresolver=letsencrypt"
      - "traefik.http.services.payload-dev.loadbalancer.server.port=3000"

  mongo:
    image: mongo:latest
    command:
      - --storageEngine=wiredTiger
      - --bind_ip_all
    volumes:
      - data:/data/db
    logging:
      driver: none
    networks:
      - app_network
    restart: unless-stopped

  traefik:
    image: traefik:v3
    container_name: traefik
    environment:
      # Newer Docker engines require API >= 1.44, but Traefik's docker
      # provider negotiates the legacy 1.24 by default — pin it explicitly.
      DOCKER_API_VERSION: "1.44"
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # containers are on multiple networks; force traefik to connect via
      # the one it shares with them (otherwise it may pick an unreachable IP)
      - "--providers.docker.network=wotan-website_web"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # global HTTP -> HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt (HTTP-01 challenge on port 80)
      - "--certificatesresolvers.letsencrypt.acme.email=joaobertottoneto@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/letsencrypt:/letsencrypt
    networks:
      - web
    restart: unless-stopped

volumes:
  data:
  media:

networks:
  app_network:
    driver: bridge
  web:
    driver: bridge

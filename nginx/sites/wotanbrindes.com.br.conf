server {
    listen 80;
    server_name wotanbrindes.com.br www.wotanbrindes.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wotanbrindes.com.br www.wotanbrindes.com.br;

    ssl_certificate /etc/letsencrypt/live/wotanbrindes.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wotanbrindes.com.br/privkey.pem;

    client_max_body_size 50M;

    location / {
        # Docker DNS resolver + variable upstream: nginx starts even if the
        # payload container is down, and re-resolves the IP on restart.
        resolver 127.0.0.11 valid=30s;
        set $upstream http://payload:3000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
